name: Build lazygit for Debian

on:
  workflow_dispatch:
    inputs:
      lazygit_version:
        description: The version of lazygit to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-lazygit:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lazygit-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.lazygit_version }}

      - name: Build lazygit
        run: ./build.sh ${{ inputs.lazygit_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: lazygit_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lazygit-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.lazygit_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            lazygit_*.dsc
            lazygit_*.orig.tar.gz
            lazygit_*.debian.tar.xz

  release-lazygit:
    name: Release lazygit for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-lazygit, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            lazygit_*.deb
            lazygit_*.dsc
            lazygit_*.orig.tar.gz
            lazygit_*.debian.tar.xz
          name: ${{ inputs.lazygit_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.lazygit_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
